name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build (mac/linux)
        if: ${{ matrix.goos != 'windows' }}
        shell: bash
        run: |
          set -euo pipefail
          BIN=nearby-gas-prices
          OUTDIR=dist
          mkdir -p "$OUTDIR"

          export GOOS="${{ matrix.goos }}"
          export GOARCH="${{ matrix.goarch }}"

          go build -trimpath -ldflags "-s -w" -o "$OUTDIR/$BIN" ./cmd/nearby-gas-prices
          tar -C "$OUTDIR" -czf "$OUTDIR/${BIN}_${GOOS}_${GOARCH}.tar.gz" "$BIN"

      - name: Build (windows)
        if: ${{ matrix.goos == 'windows' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $BIN = 'nearby-gas-prices'
          $OUTDIR = 'dist'
          New-Item -ItemType Directory -Force -Path $OUTDIR | Out-Null

          $env:GOOS = '${{ matrix.goos }}'
          $env:GOARCH = '${{ matrix.goarch }}'

          go build -trimpath -ldflags "-s -w" -o "$OUTDIR/$BIN.exe" ./cmd/nearby-gas-prices
          Compress-Archive -Path "$OUTDIR/$BIN.exe" -DestinationPath "$OUTDIR/${BIN}_${env:GOOS}_${env:GOARCH}.zip" -Force

      - name: Package skill (.skill)
        if: ${{ matrix.goos == 'linux' && matrix.goarch == 'amd64' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # .skill is just a zipped skill directory
          (cd skill && zip -r "../dist/nearby-gas-prices.skill" "nearby-gas-prices")

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.skill
